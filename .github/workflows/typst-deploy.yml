name: Deploy Typst Document

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    uses: luiswirth/typst-deploy/.github/workflows/typst-deploy.yml@v1
    with:
      entry_file: src/main.typ
      output_name: epgp-thesis.pdf
